<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="CSS\login.css">
</head>
<body>
  <div class="page-wrap">
    <div class="left-panel">
        <div class="brand">
          EventHub
          <span>Christ University</span>
        </div>
      <div class="left-caption">
        A centralized platform for managing university fests, events, and student registrations.
      </div>
    </div>

    <div class="right-panel">
      <h2>Sign In</h2>

      <div class="form-group">
        <label for="student-id">Student ID</label>
        <input type="text" id="student-id" placeholder="e.g. 2300123" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" />
      </div>
      <a href="#" class="btn-login">Login</a>
      <p class="note">
        <a href="#">Forgot password?</a>
      </p>
    </div>
  </div>
  <script>
    document.querySelector('.btn-login').addEventListener('click', function (e) {
        e.preventDefault();

        const studentId = document.getElementById('student-id').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!studentId || !password) {
            alert('Please enter both your Student ID and password.');
            return;
        }

        window.location.href = 'studenthome.html';
    });
</script>
</body>
</html>
